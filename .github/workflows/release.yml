name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select newest installed Xcode
        run: |
          DEVELOPER_DIR_PATH="$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)/Contents/Developer"
          echo "Using Xcode at $DEVELOPER_DIR_PATH"
          sudo xcode-select -s "$DEVELOPER_DIR_PATH"
          xcodebuild -version

      - name: Build, sign, notarize, and package release artifacts
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_API_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY }}
        run: ./scripts/release/build_release_artifacts.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.sha256
          body: |
            Signed and notarized macOS release artifacts for this tag.
